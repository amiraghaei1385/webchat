<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ثبت‌نام - Web Chat</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .signup-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 1rem;
        }
        
        .signup-box {
            background: white;
            border-radius: 1rem;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 450px;
            padding: 2rem;
        }
        
        .signup-box h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 0.5rem;
            font-size: 1.8em;
        }
        
        .signup-subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 2rem;
            font-size: 0.9em;
        }
        
        .form-group label {
            font-weight: 600;
            margin-bottom: 0.5rem;
            display: block;
        }
        
        .form-group input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #dee2e6;
            border-radius: 0.5rem;
            font-size: 1rem;
            margin-bottom: 1rem;
            transition: all 0.3s ease;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .password-requirements {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 0.5rem;
            padding: 1rem;
            margin-bottom: 1.5rem;
            font-size: 0.85em;
        }
        
        .requirement {
            display: flex;
            align-items: center;
            margin-bottom: 0.5rem;
            color: #666;
        }
        
        .requirement.met {
            color: #28a745;
        }
        
        .requirement-icon {
            display: inline-block;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid #ddd;
            text-align: center;
            line-height: 16px;
            margin-left: 0.5rem;
            font-size: 0.8em;
        }
        
        .requirement.met .requirement-icon {
            border-color: #28a745;
            background: #28a745;
            color: white;
        }
        
        .btn-signup {
            width: 100%;
            padding: 0.75rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 1rem;
        }
        
        .btn-signup:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
        }
        
        .btn-signup:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .login-link {
            text-align: center;
            color: #666;
        }
        
        .login-link a {
            color: #667eea;
            font-weight: 600;
            text-decoration: none;
        }
        
        .login-link a:hover {
            text-decoration: underline;
        }
        
        .error-message {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            padding: 1rem;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            display: none;
        }
        
        .success-message {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            padding: 1rem;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            display: none;
        }
        
        .loading {
            display: none;
            text-align: center;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="signup-container">
        <div class="signup-box">
            <h1>💬 ثبت‌نام</h1>
            <p class="signup-subtitle">اکانت جدید خود را ایجاد کنید</p>
            
            <div id="error-message" class="error-message"></div>
            <div id="success-message" class="success-message"></div>
            
            <form id="signup-form">
                <div class="form-group">
                    <label for="username">نام کاربری</label>
                    <input 
                        type="text" 
                        id="username" 
                        name="username" 
                        placeholder="نام نمایشی خود را انتخاب کنید"
                        required
                    >
                </div>
                
                <div class="form-group">
                    <label for="userId">آیدی (شناسه منحصر به فرد)</label>
                    <input 
                        type="text" 
                        id="userId" 
                        name="userId" 
                        placeholder="@username یا نام کاربری بدون فاصله"
                        required
                    >
                </div>
                
                <div class="form-group">
                    <label for="password">رمز عبور</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="رمز عبور قوی انتخاب کنید"
                        required
                    >
                </div>
                
                <div class="password-requirements" id="password-requirements">
                    <div class="requirement" id="req-length">
                        <span class="requirement-icon">✓</span>
                        <span>حداقل 8 کاراکتر</span>
                    </div>
                    <div class="requirement" id="req-uppercase">
                        <span class="requirement-icon">✓</span>
                        <span>شامل حرف بزرگ (A-Z)</span>
                    </div>
                    <div class="requirement" id="req-lowercase">
                        <span class="requirement-icon">✓</span>
                        <span>شامل حرف کوچک (a-z)</span>
                    </div>
                    <div class="requirement" id="req-number">
                        <span class="requirement-icon">✓</span>
                        <span>شامل عدد (0-9)</span>
                    </div>
                    <div class="requirement" id="req-special">
                        <span class="requirement-icon">✓</span>
                        <span>شامل کاراکتر خاص (!@%$#^&*)</span>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="confirmPassword">تأیید رمز عبور</label>
                    <input 
                        type="password" 
                        id="confirmPassword" 
                        name="confirmPassword" 
                        placeholder="رمز عبور را دوباره وارد کنید"
                        required
                    >
                </div>
                
                <button type="submit" class="btn-signup" id="signup-btn">ثبت‌نام</button>
                
                <div class="loading" id="loading">
                    <div class="spinner-small"></div>
                    <p>در حال ثبت‌نام...</p>
                </div>
            </form>
            
            <div class="login-link">
                <p>اکانت دارید؟ <a href="login.html">وارد شوید</a></p>
            </div>
        </div>
    </div>

    <script src="../js/storage.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/pages/signup.js"></script>
</body>
</html>
