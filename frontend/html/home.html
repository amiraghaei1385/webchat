<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صفحه اصلی - Web Chat</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .home-container {
            display: flex;
            height: 100vh;
            background: var(--bg-light);
        }

        .sidebar {
            width: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1rem 0;
            gap: 2rem;
            box-shadow: var(--shadow-md);
        }

        .sidebar-item {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.8em;
            transition: var(--transition);
            color: white;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid transparent;
        }

        .sidebar-item:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }

        .sidebar-item.active {
            border-color: white;
            background: rgba(255, 255, 255, 0.3);
        }

        .sidebar-spacer {
            flex: 1;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-white);
        }

        .top-bar {
            padding: 1rem;
            background: var(--bg-white);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .search-container {
            flex: 1;
            position: relative;
        }

        .search-container input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: 2rem;
            background: var(--bg-light);
            margin-bottom: 0;
            font-size: 0.95rem;
        }

        .search-container input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .chat-list-container {
            flex: 1;
            overflow-y: auto;
            padding: 0;
        }

        .chat-item {
            display: flex;
            align-items: center;
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            transition: var(--transition);
            position: relative;
        }

        .chat-item:hover {
            background: var(--bg-light);
        }

        .chat-item.active {
            background: rgba(102, 126, 234, 0.1);
            border-left: 3px solid var(--primary-color);
        }

        .chat-avatar {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 1.2em;
            flex-shrink: 0;
            margin-left: 1rem;
        }

        .chat-info {
            flex: 1;
            min-width: 0;
        }

        .chat-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 0.25rem;
        }

        .chat-name {
            font-weight: 600;
            color: var(--text-dark);
            font-size: 1rem;
        }

        .chat-time {
            font-size: 0.8em;
            color: var(--text-gray);
        }

        .chat-preview {
            font-size: 0.85em;
            color: var(--text-gray);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 250px;
        }

        .unread-badge {
            background: var(--primary-color);
            color: white;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75em;
            font-weight: bold;
            flex-shrink: 0;
            margin-left: 0.5rem;
        }

        .chat-actions {
            display: none;
            gap: 0.5rem;
            margin-left: 0.5rem;
        }

        .chat-item:hover .chat-actions {
            display: flex;
        }

        .action-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            color: var(--text-gray);
            font-size: 1.1em;
            padding: 0.25rem;
            transition: var(--transition);
        }

        .action-btn:hover {
            color: var(--primary-color);
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-gray);
            text-align: center;
            padding: 2rem;
        }

        .empty-state-icon {
            font-size: 4em;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .empty-state h2 {
            margin-bottom: 0.5rem;
            color: var(--text-dark);
        }

        .loading-spinner {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
        }

        .spinner {
            border: 4px solid var(--bg-light);
            border-top: 4px solid var(--primary-color);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 70px;
                padding: 0.75rem 0;
                gap: 1.5rem;
            }

            .sidebar-item {
                width: 50px;
                height: 50px;
                font-size: 1.5em;
            }

            .chat-item {
                padding: 0.75rem;
            }

            .chat-avatar {
                width: 45px;
                height: 45px;
                font-size: 1em;
            }

            .chat-preview {
                max-width: 150px;
            }

            .top-bar {
                padding: 0.75rem;
            }
        }
    </style>
</head>
<body>
    <div class="home-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-item active" title="صفحه اصلی" onclick="location.reload()">💬</div>
            <div class="sidebar-item" title="چت جدید" onclick="goToNewChat()">➕</div>
            <div class="sidebar-spacer"></div>
            <div class="sidebar-item" title="تنظیمات" onclick="goToSettings()">⚙️</div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Top Bar -->
            <div class="top-bar">
                <div class="search-container">
                    <input 
                        type="text" 
                        id="search-input" 
                        placeholder="جستجو در چت‌ها..."
                        onkeyup="handleSearch()"
                    >
                </div>
            </div>

            <!-- Chat List -->
            <div class="chat-list-container" id="chat-list-container">
                <div class="loading-spinner">
                    <div class="spinner"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/storage.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/pages/home.js"></script>
</body>
</html>
