<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تنظیمات - Web Chat</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .settings-container {
            min-height: 100vh;
            background: var(--bg-light);
            padding: 2rem 1rem;
        }

        .settings-wrapper {
            max-width: 600px;
            margin: 0 auto;
        }

        .settings-header {
            display: flex;
            align-items: center;
            margin-bottom: 3rem;
            gap: 1.5rem;
        }

        .settings-header-back {
            cursor: pointer;
            font-size: 2em;
            color: var(--primary-color);
            transition: var(--transition);
        }

        .settings-header-back:hover {
            transform: scale(1.1);
        }

        .settings-header h1 {
            margin: 0;
            font-size: 2em;
        }

        .setting-item {
            background: var(--bg-white);
            padding: 1.5rem;
            border-radius: 0.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
        }

        .setting-item:hover {
            box-shadow: var(--shadow-md);
        }

        .setting-info h3 {
            margin: 0 0 0.5rem 0;
            font-size: 1.05em;
        }

        .setting-info p {
            margin: 0;
            font-size: 0.85em;
            color: var(--text-gray);
        }

        .setting-item button {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.3rem;
            cursor: pointer;
            white-space: nowrap;
            transition: var(--transition);
            font-weight: 500;
        }

        .setting-item button:hover {
            background: var(--secondary-color);
            transform: translateY(-2px);
        }

        .setting-item.danger button {
            background: var(--error-color);
        }

        .setting-item.danger button:hover {
            background: #c82333;
        }

        .setting-item.warning button {
            background: var(--warning-color);
            color: var(--text-dark);
        }

        .setting-item.warning button:hover {
            background: #e0a800;
        }

        .divider {
            height: 1px;
            background: var(--border-color);
            margin: 2rem 0;
        }

        .settings-section-title {
            font-size: 0.9em;
            color: var(--text-gray);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin: 2rem 0 1rem 0;
            font-weight: 600;
        }

        .user-info {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 2rem;
            border-radius: 0.5rem;
            margin-bottom: 2rem;
            text-align: center;
        }

        .user-info h2 {
            margin: 0 0 0.5rem 0;
        }

        .user-info p {
            margin: 0;
            opacity: 0.9;
        }

        .switch {
            position: relative;
            width: 50px;
            height: 30px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
            margin: 0;
            padding: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: 0.4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 22px;
            width: 22px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: 0.4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: var(--primary-color);
        }

        input:checked + .slider:before {
            transform: translateX(20px);
        }

        @media (max-width: 768px) {
            .settings-container {
                padding: 1rem;
            }

            .settings-header {
                margin-bottom: 2rem;
            }

            .setting-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 1rem;
            }

            .setting-item button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="settings-container">
        <div class="settings-wrapper">
            <!-- Header -->
            <div class="settings-header">
                <span class="settings-header-back" onclick="goBack()">←</span>
                <h1>تنظیمات</h1>
            </div>

            <!-- User Info -->
            <div class="user-info" id="user-info">
                <h2 id="username-display">Loading...</h2>
                <p id="userid-display">@loading</p>
            </div>

            <!-- Display Settings -->
            <div class="settings-section-title">صفحه نمایش</div>
            
            <div class="setting-item">
                <div class="setting-info">
                    <h3>تم (روز/شب)</h3>
                    <p>بین تم روز و شب تغییر کنید</p>
                </div>
                <label class="switch">
                    <input type="checkbox" id="theme-toggle" onchange="toggleTheme()">
                    <span class="slider"></span>
                </label>
            </div>

            <!-- Account Settings -->
            <div class="settings-section-title">حساب</div>

            <div class="setting-item">
                <div class="setting-info">
                    <h3>تغییر پروفایل</h3>
                    <p>ویرایش نام و عکس خود</p>
                </div>
                <button onclick="alert('این قابلیت در فاز 2 اضافه می‌شود')">ویرایش</button>
            </div>

            <div class="setting-item">
                <div class="setting-info">
                    <h3>رمز عبور</h3>
                    <p>تغییر رمز عبور خود</p>
                </div>
                <button onclick="alert('این قابلیت در فاز 2 اضافه می‌شود')">تغییر</button>
            </div>

            <!-- Danger Zone -->
            <div class="divider"></div>
            <div class="settings-section-title" style="color: var(--error-color);">منطقه خطر</div>

            <div class="setting-item danger">
                <div class="setting-info">
                    <h3>خروج</h3>
                    <p>از حساب خود خارج شوید</p>
                </div>
                <button onclick="handleLogout()">خروج</button>
            </div>

            <div class="setting-item danger">
                <div class="setting-info">
                    <h3>حذف حساب</h3>
                    <p>حذف دائمی حساب خود</p>
                </div>
                <button onclick="alert('این قابلیت در فاز 2 اضافه می‌شود')">حذف</button>
            </div>
        </div>
    </div>

    <script src="../js/storage.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/pages/settings.js"></script>
</body>
</html>
